<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morela Global</title>

<link rel="icon" type="image/png" href="Compact Intertwined Graphic Symbol.png">

<style>
/* (same CSS as before, unchanged for brevity) */
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
body{background:#000;color:#fff;line-height:1.7;}
nav{position:fixed;top:0;width:100%;padding:22px 40px;display:flex;justify-content:space-between;align-items:center;background:#000;border-bottom:1px solid #111;z-index:1000;}
nav h1{letter-spacing:3px;font-size:14px;font-weight:500;}
nav ul{display:flex;gap:28px;list-style:none;}
nav a{color:#aaa;text-decoration:none;font-size:13px;transition:.3s;}
nav a:hover{color:#fff;}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.hero img{width:min(720px,90vw);margin-bottom:25px;}
.hero h2{letter-spacing:8px;font-weight:300;opacity:.8;}
section{padding:120px 15%;border-top:1px solid #111;}
.section-title{font-size:36px;margin-bottom:35px;text-align:center;}
.paragraph{max-width:900px;margin:0 auto;background:#0f0f0f;border:1px solid #222;padding:40px;border-radius:16px;color:#ddd;}
.paragraph-center{text-align:center;margin-top:25px;color:#fff;font-weight:500;}
.grid{display:grid;gap:20px;margin-top:40px;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
.block{border:1px solid #222;border-radius:14px;overflow:hidden;background:#0f0f0f;transition:.3s;}
.block:hover{border-color:#fff;transform:translateY(-4px);background:#141414;box-shadow:0 0 0 1px #fff inset;}
.block img{width:100%;height:160px;object-fit:cover;filter:grayscale(100%);}
.block:hover img{filter:grayscale(0);}
.block-content{padding:18px;text-align:center;font-size:14px;color:#ddd;}
.fade{opacity:0;transform:translateY(40px);transition:1s;}
.fade.show{opacity:1;transform:translateY(0);}
</style>
</head>

<body>

<nav>
<h1>MORELA GLOBAL</h1>
<ul>
<li><a href="#about">About</a></li>
<li><a href="#goal">Goals</a></li>
<li><a href="#services">Services</a></li>
<li><a href="#company">Company</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<div class="hero">
<img src="Compact Intertwined Graphic Symbol.png">
<h2>MORELA GLOBAL</h2>
</div>

<section id="services" class="fade">
<div class="section-title">Our Services</div>

<div class="grid grid-4">

<div class="block">
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
<div class="block-content">Technology</div>
</div>

<div class="block">
<img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba">
<div class="block-content">Entertainment</div>
</div>

<div class="block">
<img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854">
<div class="block-content">Food & Agriculture</div>
</div>

<div class="block">
<img src="https://images.unsplash.com/photo-1581093458791-9f3c3900df1c">
<div class="block-content">Health & Medicine</div>
</div>

<div class="block">
<img src="https://images.unsplash.com/photo-1553729459-efe14ef6055d">
<div class="block-content">Finance</div>
</div>

<div class="block">
<img src="https://images.unsplash.com/photo-1532094349884-543bc11b234d">
<div class="block-content">Science & Research</div>
</div>

<div class="block">
<img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b">
<div class="block-content">Security</div>
</div>

<div class="block">
<img src="https://images.unsplash.com/photo-1541888946425-d81bb19240f5">
<div class="block-content">Military & Defence</div>
</div>

</div>
</section>

<script>
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show")
}
})
})
document.querySelectorAll(".fade").forEach(el=>observer.observe(el))
</script>

</body>
</html>
